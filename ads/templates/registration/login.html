<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация — FYND</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background:#0e0e10;
            color:white;
            font-family:'Inter',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:#18181b;
            padding:32px;
            border-radius:20px;
            width:100%;
            max-width:380px;
        }

        h2 {
            margin-bottom:20px;
            text-align:center;
        }

        input {
            width:100%;
            padding:12px;
            border-radius:12px;
            border:none;
            margin-bottom:12px;
            background:#0e0e10;
            color:white;
        }

        button {
            width:100%;
            padding:12px;
            border-radius:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-weight:500;
            cursor:pointer;
        }

        button:hover {
            background:#1d4ed8;
        }

        .divider {
            text-align:center;
            margin:16px 0;
            opacity:.6;
        }

        .error {
            color:#f87171;
            margin-bottom:12px;
            text-align:center;
        }
    </style>
</head>

<body>
<div class="card">
    <h2>FYND</h2>

    {% if form.errors %}
        <div class="error">Неверный логин или пароль</div>
    {% endif %}

    <!-- ВХОД -->
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>

    <div class="divider">или</div>

    <!-- РЕГИСТРАЦИЯ -->
    <form method="post" action="/accounts/signup/">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Новый логин" required>
        <input type="password" name="password1" placeholder="Пароль" required>
        <input type="password" name="password2" placeholder="Повторите пароль" required>
        <button type="submit">Зарегистрироваться</button>
    </form>

</div>

</body>
</html>
