{% load socialaccount %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FYND — Вход</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{
    background:#0e0e10;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    margin:0;
}
.card{
    background:#18181b;
    padding:40px 32px;
    border-radius:20px;
    width:100%;
    max-width:380px;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
    text-align:center;
}
.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:8px;
}
.sub{
    color:rgba(255,255,255,0.4);
    font-size:0.85rem;
    margin-bottom:32px;
}
.btn-google{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:13px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    background:#18181b;
    color:#e0e0e0;
    font-size:0.95rem;
    font-weight:500;
    cursor:pointer;
    text-decoration:none;
    transition:background 0.15s, border-color 0.15s;
    box-sizing:border-box;
}
.btn-google:hover{
    background:#222228;
    border-color:rgba(255,255,255,0.28);
    color:#fff;
}
.btn-google svg{flex-shrink:0;}
</style>
</head>
<body>
<div class="card">
    <div class="logo">FYND</div>
    <div class="sub">Войдите, чтобы продолжить</div>
    <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.6 1 6.7 6.6 3.2 14.6l7 5.4C12 14 17.5 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-17.1l.4.2z"/>
            <path fill="#FBBC05" d="M10.2 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.6-6.1z"/>
            <path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.2 2-6.1 2-6.5 0-12-4.5-14-10.7l-7.6 6.1C6.7 41.4 14.6 47 24 47z"/>
        </svg>
        Войти через Google
    </a>
</div>
</body>
</html>
