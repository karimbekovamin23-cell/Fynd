<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Подтверждение — FYND</title>

<style>
body{
    background:#0e0e10;
    color:white;
    font-family:Inter;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#18181b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

a{
    color:#4ade80;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

{% if confirmation %}

<h2>Подтвердить почту</h2>

<form method="post">
    {% csrf_token %}
    <button type="submit">Подтвердить</button>
</form>

{% else %}

<h2>Ссылка недействительна</h2>

{% endif %}

</div>

</body>
</html>
