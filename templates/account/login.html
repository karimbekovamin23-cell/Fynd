{% load socialaccount %}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FYND — Вход</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    background:#0e0e10;
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:#18181b;
    padding:32px;
    border-radius:20px;
    width:100%;
    max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.title{
    text-align:center;
    margin-bottom:20px;
    font-size:20px;
    font-weight:600;
}

.switch{
    display:flex;
    margin-bottom:20px;
    background:#0e0e10;
    border-radius:10px;
    overflow:hidden;
}

.switch button{
    flex:1;
    padding:10px;
    border:none;
    background:none;
    color:#9ca3af;
    cursor:pointer;
}

.switch .active{
    background:#2563eb;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border-radius:12px;
    border:1px solid #2a2a2e;
    background:#0e0e10;
    color:#4ade80;
}

input:focus{
    outline:none;
    border:1px solid #4ade80;
}

button.submit{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#2563eb;
    color:white;
    font-weight:500;
    cursor:pointer;
}

button.submit:hover{
    background:#1d4ed8;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

.divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:16px 0;
    color:rgba(255,255,255,0.25);
    font-size:0.8rem;
}
.divider::before,.divider::after{
    content:'';
    flex:1;
    height:1px;
    background:rgba(255,255,255,0.1);
}

.btn-google{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:11px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    background:#18181b;
    color:#e0e0e0;
    font-size:0.9rem;
    font-weight:500;
    cursor:pointer;
    text-decoration:none;
    transition:background 0.15s, border-color 0.15s;
}
.btn-google:hover{
    background:#222228;
    border-color:rgba(255,255,255,0.22);
    color:#fff;
}
.btn-google svg{
    flex-shrink:0;
}
</style>
</head>

<body>

<div class="card">

<div class="title">FYND</div>

<div class="switch">
    <button id="loginBtn" class="active">Вход</button>
    <button id="registerBtn">Регистрация</button>
</div>

<!-- ВХОД -->
<form method="post" class="form active" id="loginForm">
    {% csrf_token %}
    <input name="login" placeholder="email">
    <input type="password" name="password" placeholder="Пароль">
    <button class="submit">Войти</button>

    <div class="divider">или</div>

    <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.6 1 6.7 6.6 3.2 14.6l7 5.4C12 14 17.5 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-17.1l.4.2z"/><path fill="#FBBC05" d="M10.2 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.6-6.1z"/><path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.2 2-6.1 2-6.5 0-12-4.5-14-10.7l-7.6 6.1C6.7 41.4 14.6 47 24 47z"/></svg>
        Войти через Google
    </a>
</form>

<!-- РЕГИСТРАЦИЯ -->
<form method="post" action="/accounts/signup/" class="form" id="registerForm">
    {% csrf_token %}
    <input name="email" placeholder="Email">
    <input type="password" name="password1" placeholder="Пароль">
    <input type="password" name="password2" placeholder="Повторите пароль">
    <button class="submit">Зарегистрироваться</button>

    <div class="divider">или</div>

    <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.6 1 6.7 6.6 3.2 14.6l7 5.4C12 14 17.5 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-17.1l.4.2z"/><path fill="#FBBC05" d="M10.2 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.6-6.1z"/><path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.8 1.2-4.2 2-6.1 2-6.5 0-12-4.5-14-10.7l-7.6 6.1C6.7 41.4 14.6 47 24 47z"/></svg>
        Зарегистрироваться через Google
    </a>
</form>

</div>

<script>

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

loginBtn.onclick = () => {
    loginBtn.classList.add("active");
    registerBtn.classList.remove("active");

    loginForm.classList.add("active");
    registerForm.classList.remove("active");
};

registerBtn.onclick = () => {
    registerBtn.classList.add("active");
    loginBtn.classList.remove("active");

    registerForm.classList.add("active");
    loginForm.classList.remove("active");
};

</script>

</body>
</html>
