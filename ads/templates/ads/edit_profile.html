{% extends "base.html" %}

{% block content %}

<div class="container" style="max-width:600px;margin:40px auto;">

<h2>Редактировать профиль</h2>

<form method="post" enctype="multipart/form-data">

    {% csrf_token %}

    {% if error %}
    <div style="background:#7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:10px;margin-bottom:15px;font-size:0.9rem;">
        {{ error }}
    </div>
    {% endif %}

    <div style="margin-bottom:15px;">
        <label>Имя пользователя</label>
        <input type="text" name="username" value="{{ request.user.username }}" class="form-control" maxlength="150">
    </div>

    <div style="margin-bottom:15px;">
        <label>Телефон</label>
        <input type="text" name="phone" value="{{ profile.phone }}" class="form-control">
    </div>

    <div style="margin-bottom:15px;">
        <label>Telegram</label>
        <input type="text" name="telegram" value="{{ profile.telegram }}" class="form-control">
    </div>

    <div style="margin-bottom:15px;">
        <label>Аватар</label>
        <input type="file" name="avatar" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">
        Сохранить
    </button>

</form>

</div>

{% endblock %}
