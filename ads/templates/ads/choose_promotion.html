{% extends "base.html" %}
{% block content %}

<style>
.wrap{
    max-width:600px;
    margin:50px auto;
}

.plan{
    background:#18181b;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #222;
}

.plan:hover{
    border:1px solid #2563eb;
    transform:translateY(-3px);
}

.price{
    color:#4ade80;
    font-size:20px;
    margin-top:10px;
}
</style>

<div class="wrap">

<h2>🚀 Продвижение объявления</h2>

<p><strong>{{ ad.title }}</strong></p>

<!-- PAYMENTS_DISABLED: раскомментируй блок ниже и удали заглушку чтобы включить -->
<div style="background:#18181b; border:1px solid #2a2a2e; border-radius:15px; padding:30px; text-align:center; color:rgba(255,255,255,0.6);">
    <div style="font-size:2rem; margin-bottom:12px;">🔧</div>
    <div style="font-size:1.1rem; font-weight:600; color:#fff; margin-bottom:8px;">Временно недоступно</div>
    <div style="font-size:0.9rem;">Оплата продвижения скоро заработает. Спасибо за терпение!</div>
    <a href="/profile/" style="display:inline-block; margin-top:20px; color:#2563eb; text-decoration:none; font-size:0.9rem;">← Вернуться в профиль</a>
</div>

</div>

{% endblock %}
