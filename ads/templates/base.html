<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYND</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0e0e10;
    color:white;
    font-family:Inter, sans-serif;
}

/* 🔥 ОСНОВНОЙ КОНТЕЙНЕР */
.main-container{
    max-width:1200px;
    margin:0 auto;
    padding:16px;
}

/* 🔥 ШАПКА */
.navbar{
    background:#0e0e10 !important;
    border-bottom:none;
    padding:12px 0;
}

/* ЛОГО */
.navbar-brand{
    font-weight:600;
    font-size:20px;
    color:white !important;
}

/* КНОПКИ */
.nav-btn{
    margin-left:10px;
    background:#18181b !important;
    color:#9ca3af !important;
    border:none !important;
    border-radius:10px;
    padding:6px 12px;
    font-size:14px;
    transition:0.2s;
}

/* ХОВЕР */
.nav-btn:hover{
    background:#2563eb !important;
    color:white !important;
    transform:translateY(-1px);
}

/* bootstrap рамки */
.btn-outline-info,
.btn-outline-warning,
.btn-outline-light{
    border:none !important;
}

/* БЕЙДЖ */
.chat-badge{
    background:#ef4444;
    color:white;
    border-radius:10px;
    padding:2px 6px;
    font-size:11px;
    margin-left:5px;
    display:inline-block;
}

/* 🔥 МОБИЛКА */
@media (max-width:768px){

    .main-container{
        padding:10px;
    }

    .navbar .container{
        flex-direction:column;
        align-items:flex-start;
    }

    .d-flex{
        width:100%;
        margin-top:10px;
        flex-wrap:wrap;
    }

    .nav-btn{
        margin:5px 5px 0 0;
        padding:6px 10px;
        font-size:13px;
    }

}
</style>

</head>

<body>

{% if show_navbar != False %}
<nav class="navbar navbar-dark">
<div class="container">

<a class="navbar-brand" href="/">FYND</a>

<div class="d-flex">

{% if user.is_authenticated %}

<a href="/chats/" class="btn btn-outline-info btn-sm nav-btn">
💬 Чаты

<span id="chat-badge" class="chat-badge"
{% if unread == 0 %}style="display:none"{% endif %}>
{{ unread }}
</span>

</a>

<a href="{% url 'favorites' %}" class="btn btn-outline-warning btn-sm nav-btn">
❤️ Избранное
</a>

<a href="{% url 'profile' user.username %}" class="btn btn-outline-light btn-sm nav-btn">
👤 Профиль
</a>

{% else %}

<a href="/accounts/login/" class="btn btn-success btn-sm">
Войти
</a>

{% endif %}

</div>

</div>
</nav>
{% endif %}

<!-- 🔥 ВАЖНО: ЗАМЕНИЛ container НА main-container -->
<div class="main-container">
{% block content %}
{% endblock %}
</div>

<script>

let notificationSocket = null;

function connectSocket() {

    // 🔥 защита от спама сокетов
    if (
        notificationSocket &&
        (
            notificationSocket.readyState === WebSocket.OPEN ||
            notificationSocket.readyState === WebSocket.CONNECTING
        )
    ){
        return;
    }

    const protocol =
        window.location.protocol === "https:"
        ? "wss://"
        : "ws://";

    notificationSocket = new WebSocket(
        protocol + window.location.host + "/ws/notifications/"
    );

    // ✅ подключено
    notificationSocket.onopen = () => {
        console.log("✅ Notification connected");
    };

    // 🔥 получили уведомление
    notificationSocket.onmessage = function(e) {

        console.log("🔥 RAW:", e.data);

        const data = JSON.parse(e.data);

        const parts = window.location.pathname.split("/");
        const currentChatId = parts.includes("chat")
            ? parts[2]
            : null;

        // 🔥 если уже в этом чате → badge не увеличиваем
        if (String(data.chat_id) === String(currentChatId)) {
            return;
        }

        const badge = document.querySelector("#chat-badge");

        if (!badge) return;

        let count = parseInt(badge.innerText);

        if (isNaN(count)) {
            count = 0;
        }

        count += 1;

        badge.innerText = count;
        badge.style.display = "inline-block";
    };

    // ❌ websocket закрылся
    notificationSocket.onclose = function() {

        console.log("❌ Notification socket closed");

        // 🔥 reconnect через 3 сек
        setTimeout(() => {
            connectSocket();
        }, 3000);
    };

    // ❌ ошибка websocket
    notificationSocket.onerror = function(e) {

        console.log("❌ Notification socket error", e);

        notificationSocket.close();
    };
}

// 🚀 запуск
connectSocket();


// 🔥 fallback unread count
setInterval(() => {

    fetch("/api/unread-count/")
        .then(res => res.json())
        .then(data => {

            const badge = document.querySelector("#chat-badge");

            if (!badge) return;

            if (data.count > 0) {

                badge.innerText = data.count;
                badge.style.display = "inline-block";

            } else {

                badge.style.display = "none";

            }

        });

}, 5000);

</script>

</body>
</html>
