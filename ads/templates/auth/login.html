<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — FYND</title>
</head>
<body>
<h2>Вход</h2>

<form method="post">
    {% csrf_token %}
    <input name="username" placeholder="Логин"><br><br>
    <input type="password" name="password" placeholder="Пароль"><br><br>
    <button type="submit">Войти</button>
</form>

<p><a href="{% url 'register' %}">Регистрация</a></p>
</body>
</html>
