<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0e0e10;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
.spinner{width:40px;height:40px;border:3px solid #2a2a2e;border-top-color:#2563eb;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="spinner"></div>
<form id="f" method="post">
    {% csrf_token %}
</form>
<script>document.getElementById('f').submit();</script>
</body>
</html>
